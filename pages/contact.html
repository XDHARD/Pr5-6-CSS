<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact page with a feedback form">
  <title>Contact</title>

  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/responsive.css">
</head>

<body>
<header>
  <div class="container">
    <nav>
      <a href="../index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</header>

<main class="container">
  <div class="card">
    <h1>Contact</h1>
    <p>Fill out the form below to contact me.</p>
  </div>

  <div class="card">
    <form action="./submit.html">
      <div class="form-group">
        <label for="name">Name:</label>
        <input id="name" name="name" type="text" required minlength="2" maxlength="30">
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input id="email" name="email" type="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone:</label>
        <input id="phone" name="phone" type="tel">
      </div>

      <div class="form-group">
        <label for="topic">Topic:</label>
        <select id="topic" name="topic">
          <option value="study">Study</option>
          <option value="work">Work</option>
          <option value="other">Other</option>
        </select>
      </div>

      <fieldset>
        <legend>Contact Method</legend>
        <label><input type="radio" name="contact" value="email" checked> Email</label>
        <label><input type="radio" name="contact" value="phone"> Phone</label>
      </fieldset>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5"></textarea>
      </div>

      <div class="form-group">
        <label><input type="checkbox" required>I agree to the terms and conditions</label>
      </div>

      <button type="submit" id="btn">Submit</button>
    </form>
  </div>
</main>
<script src="../src/app.js" defer></script>
<footer>
  <p>&copy; 2026 Gitsevych Yaroslav</p>
</footer>
</body>
</html>
